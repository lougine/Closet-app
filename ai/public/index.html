<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Wardrobe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
      --border: #2a2a2a; --accent: #c8a96e; --accent2: #e8c898;
      --text: #f0ece4; --text-muted: #888;
      --user-bubble: #1a1a2e; --bot-bubble: #1a1a1a; --radius: 18px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(200,169,110,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(200,169,110,0.03) 0%, transparent 60%);
    }
    .header { text-align: center; margin-bottom: 16px; animation: fadeDown 0.8s ease both; }
    .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 300; letter-spacing: 0.12em; color: var(--accent2); }
    .header p { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 6px; }
    .header-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 12px auto 0; }
    .weather-bar { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; animation: fadeDown 0.8s ease 0.1s both; }
    .weather-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 0.78rem; color: var(--accent); }
    .chat-wrapper { width: 100%; max-width: 680px; display: flex; flex-direction: column; animation: fadeUp 0.8s ease 0.2s both; }
    .chat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; height: 520px; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 10px; animation: fadeIn 0.3s ease both; max-width: 95%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .msg.bot  .avatar { background: linear-gradient(135deg, #2a2010, #3a300e); border: 1px solid var(--accent); }
    .msg.user .avatar { background: var(--user-bubble); border: 1px solid #333; }
    .bubble { padding: 12px 16px; border-radius: 16px; font-size: 0.88rem; line-height: 1.6; max-width: 100%; }
    .msg.bot  .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .msg.user .bubble { background: var(--user-bubble); border: 1px solid #2a2a4a; border-top-right-radius: 4px; color: #c8c8f0; }
    .options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .opt-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
    .opt-btn:hover { background: var(--accent); color: #000; }
    .summary-bar { background: #1a1500; border: 1px solid #3a3000; border-radius: 8px; padding: 8px 12px; font-size: 0.74rem; color: var(--accent); margin-bottom: 10px; }
    .outfits-grid { display: flex; flex-direction: column; gap: 12px; }
    .outfit-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .outfit-card.saved-card { border-color: #3a2f10; background: #1a1500; }
    .outfit-img-wrap { position: relative; width: 100%; height: 220px; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .outfit-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 0.5s ease; position: absolute; top: 0; left: 0; }
    .outfit-img-loader { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; z-index: 1; }
    .outfit-card-body { padding: 14px 16px; }
    .outfit-card-title { font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .outfit-card.saved-card .outfit-card-title { color: var(--accent2); }
    .outfit-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #bbb; margin-bottom: 4px; }
    .outfit-colors { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; font-style: italic; }
    .outfit-actions { display: flex; gap: 8px; margin-top: 10px; }
    .saved-badge { font-size: 0.68rem; background: #2a1f10; color: var(--accent); padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
    .like-btn, .dislike-btn, .save-btn { border: none; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .like-btn    { background: #1a2e1a; color: #6fcf97; border: 1px solid #2a4a2a; }
    .dislike-btn { background: #2e1a1a; color: #eb5757; border: 1px solid #4a2a2a; }
    .save-btn    { background: #2a1f10; color: var(--accent); border: 1px solid #3a2f10; }
    .like-btn:hover    { background: #2a4a2a; }
    .dislike-btn:hover { background: #4a2a2a; }
    .save-btn:hover    { background: #3a2f10; }
    .outfit-reason { font-size: 0.74rem; color: var(--accent); margin-top: 10px; padding: 8px 12px; background: linear-gradient(135deg, #1a1500, #1a1000); border: 1px solid #2a2000; border-radius: 8px; line-height: 1.7; letter-spacing: 0.01em; }
    .outfit-confidence { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .confidence-badge { font-size: 0.82rem; color: var(--accent2); font-weight: 500; }
    .confidence-pct { font-size: 0.68rem; color: var(--text-muted); background: var(--surface); padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border); }
    .section-divider { font-size: 0.72rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin: 10px 0 6px; padding: 6px 10px; background: #1a1a00; border: 1px solid #3a3000; border-radius: 6px; }
    .typing .bubble { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }
    .input-area { background: var(--surface2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 14px 16px; display: flex; gap: 10px; align-items: center; }
    .input-area input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 10px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s; }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--text-muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a07840); border: none; color: #000; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; flex-shrink: 0; }
    .send-btn:hover { transform: scale(1.08); }
    .quick-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; animation: fadeUp 0.8s ease 0.4s both; }
    .quick-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
    .bottom-bar { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; justify-content: center; animation: fadeUp 0.8s ease 0.5s both; }
    .bottom-link { color: var(--text-muted); font-size: 0.75rem; text-decoration: none; border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; transition: all 0.2s; cursor: pointer; font-family: 'DM Sans', sans-serif; background: transparent; }
    .bottom-link:hover { border-color: var(--accent); color: var(--accent); }
    /* AI Stylist Tips Panel */
    .stylist-panel { width: 100%; max-width: 680px; margin-top: 20px; animation: fadeUp 0.8s ease 0.6s both; }
    .stylist-card { background: linear-gradient(135deg, #1a1500, #161616); border: 1px solid #2a2000; border-radius: var(--radius); padding: 20px; }
    .stylist-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .stylist-icon { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a07840); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .stylist-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--accent2); letter-spacing: 0.08em; }
    .stylist-subtitle { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }
    .tip-items { display: flex; flex-direction: column; gap: 10px; }
    .tip-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; background: rgba(200,169,110,0.05); border: 1px solid rgba(200,169,110,0.1); border-radius: 10px; font-size: 0.78rem; color: #ccc; line-height: 1.5; transition: border-color 0.2s; }
    .tip-item:hover { border-color: var(--accent); }
    .tip-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    /* Style Profile Badge */
    .style-badge { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, rgba(200,169,110,0.15), rgba(200,169,110,0.05)); border: 1px solid rgba(200,169,110,0.3); border-radius: 20px; padding: 4px 14px; font-size: 0.72rem; color: var(--accent2); letter-spacing: 0.1em; animation: fadeIn 1s ease 1s both; }
    .style-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes fadeIn   { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Smart Wardrobe</h1>
    <p>AI-Powered Style Intelligence</p>
    <div class="header-line"></div>
    <div id="styleBadge" style="margin-top: 10px;"></div>
  </div>

  <div class="weather-bar" id="weatherBar">
    <div class="weather-chip">⏳ Loading weather...</div>
  </div>

  <div class="chat-wrapper">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask your AI stylist anything..." autocomplete="off"/>
      <button class="send-btn" onclick="sendMessage()">&#9658;</button>
    </div>
  </div>

  <div class="quick-actions">
    <button class="quick-btn" onclick="quickSend('suggest outfit')">&#10024; Suggest Outfit</button>
    <button class="quick-btn" onclick="quickSend('show more')">&#128260; More Options</button>
    <button class="quick-btn" onclick="quickSend('what should I buy next?')">&#128717; Shop the Look</button>
    <button class="quick-btn" onclick="quickSend('style tips')">&#128161; Style Tips</button>
    <button class="quick-btn" onclick="quickSend('what is on my calendar')">&#128197; Calendar</button>
  </div>

  <!-- AI Stylist Tips Panel -->
  <div class="stylist-panel" id="stylistPanel">
    <div class="stylist-card">
      <div class="stylist-header">
        <div class="stylist-icon">&#10024;</div>
        <div>
          <div class="stylist-title">AI Stylist Insights</div>
          <div class="stylist-subtitle">Personalized for your wardrobe</div>
        </div>
      </div>
      <div class="tip-items" id="tipItems">
        <div class="tip-item"><span class="tip-icon">⏳</span> Loading your style insights...</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <a href="/analytics.html" class="bottom-link">&#128202; Analytics Dashboard</a>
    <button class="bottom-link" onclick="quickSend('show my style profile')">&#128100; Style Profile</button>
  </div>

<script>
  var chatBox   = document.getElementById("chatBox");
  var userInput = document.getElementById("userInput");
  var weatherBar = document.getElementById("weatherBar");
  var lastContext = null;

  // Persist SESSION_ID in localStorage
  var SESSION_ID = localStorage.getItem("sw_session_id");
  if (!SESSION_ID) {
    SESSION_ID = "session_" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("sw_session_id", SESSION_ID);
  }

  userInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
  });

  window.onload = function() {
    loadWeatherBar();
    loadStylistPanel();
    loadStyleBadge();
    setTimeout(function() {
      addBotMessage("Welcome to Smart Wardrobe! ✨ I'm your AI-powered style assistant. I analyze weather, your preferences, and fashion theory to create perfect outfits. Try asking me to suggest an outfit!");
    }, 400);
  };

  function loadStyleBadge() {
    fetch('/analytics/style-profile?userId=' + SESSION_ID)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        var style = data.predominantStyle || 'Analyzing...';
        document.getElementById('styleBadge').innerHTML =
          '<div class="style-badge"><span class="style-badge-dot"></span> Style Archetype: ' + style + '</div>';
      })
      .catch(function() {});
  }

  function loadStylistPanel() {
    // Load wardrobe stats + style insights
    Promise.all([
      fetch('/clothes').then(function(r) { return r.json(); }),
      fetch('/analytics/style?userId=' + SESSION_ID).then(function(r) { return r.json(); }),
      fetch('/weather').then(function(r) { return r.json(); })
    ]).then(function(results) {
      var clothes = results[0];
      var style = results[1];
      var weather = results[2];
      var tips = [];

      // Tip 1: Weather-based
      if (weather && weather.temp) {
        var tempNum = parseFloat(weather.temp);
        if (tempNum > 30) {
          tips.push({ icon: '☀️', text: 'It\'s ' + weather.temp + ' outside. Opt for breathable fabrics and light colors to stay cool while looking sharp.' });
        } else if (tempNum < 15) {
          tips.push({ icon: '🧥', text: 'Cold weather calls for layering. Deep tones like navy and charcoal pair beautifully with structured outerwear.' });
        } else {
          tips.push({ icon: '⛅', text: 'Perfect weather for versatile looks! Mix light and dark tones for a balanced, effortless style.' });
        }
      }

      // Tip 2: Wardrobe utilization
      var unworn = clothes.filter(function(c) { return !c.wearCount || c.wearCount === 0; });
      if (unworn.length > 0) {
        tips.push({ icon: '♻️', text: 'You have ' + unworn.length + ' items never worn. I\'ll prioritize these in suggestions to maximize your wardrobe\'s potential.' });
      }

      // Tip 3: Style insight
      if (style && style.topColors && style.topColors.length > 0) {
        tips.push({ icon: '🎨', text: 'Your signature palette leans towards ' + style.topColors.slice(0, 3).join(', ') + '. I use this to curate outfits that feel authentically you.' });
      }

      // Tip 4: Wardrobe size
      var types = {};
      clothes.forEach(function(c) { types[c.type] = (types[c.type] || 0) + 1; });
      var typeList = Object.keys(types).map(function(t) { return types[t] + ' ' + t + 's'; }).join(', ');
      tips.push({ icon: '👔', text: 'Your wardrobe: ' + clothes.length + ' pieces (' + typeList + '). Each suggestion is scored from these items using AI.' });

      // Render
      var container = document.getElementById('tipItems');
      if (tips.length === 0) {
        container.innerHTML = '<div class="tip-item"><span class="tip-icon">💡</span> Start by asking me to suggest an outfit to unlock personalized insights.</div>';
        return;
      }
      container.innerHTML = tips.map(function(t) {
        return '<div class="tip-item"><span class="tip-icon">' + t.icon + '</span> ' + t.text + '</div>';
      }).join('');
    }).catch(function() {
      document.getElementById('tipItems').innerHTML = '<div class="tip-item"><span class="tip-icon">💡</span> Ask me to suggest an outfit to get started!</div>';
    });
  }

  function loadWeatherBar() {
    fetch("/weather")
      .then(function(res) { return res.json(); })
      .then(function(c) {
        weatherBar.innerHTML =
          '<div class="weather-chip">&#127748; ' + c.weather + ' ' + c.temp + '</div>' +
          '<div class="weather-chip">&#128197; ' + c.season + '</div>' +
          '<div class="weather-chip">&#128336; ' + c.time + '</div>' +
          '<div class="weather-chip">&#128205; ' + c.city + '</div>';
      })
      .catch(function() {
        weatherBar.innerHTML = '<div class="weather-chip">&#9888; Weather unavailable</div>';
      });
  }

  function quickSend(text) {
    userInput.value = text;
    sendMessage();
  }

  function sendMessage() {
    var msg = userInput.value.trim();
    if (!msg) return;
    addUserMessage(msg);
    userInput.value = "";
    var typingId = addTyping();
    fetch("/chatbot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, sessionId: SESSION_ID })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      removeTyping(typingId);
      handleBotResponse(data);
    })
    .catch(function() {
      removeTyping(typingId);
      addBotMessage("Could not connect to server.");
    });
  }


  var colorMap = {
    "white": "#f5f5f5", "black": "#1a1a1a", "grey": "#9e9e9e", "gray": "#9e9e9e",
    "navy": "#1a237e", "blue": "#1565c0", "light blue": "#42a5f5", "dark blue": "#0d47a1",
    "beige": "#d7ccc8", "khaki": "#c8b878", "tan": "#c8a96e", "brown": "#795548",
    "dark brown": "#4e342e", "burgundy": "#7b1fa2", "charcoal": "#37474f",
    "light grey": "#bdbdbd", "dark grey": "#616161", "ivory": "#fffff0",
    "red": "#c62828", "green": "#2e7d32", "yellow": "#f9a825", "orange": "#e65100",
    "pink": "#ad1457", "purple": "#6a1b9a", "white sneakers": "#f5f5f5",
    "nude": "#d4a574"
  };

  function getColor(colorStr) {
    if (!colorStr) return "#555";
    var c = colorStr.toLowerCase().trim();
    return colorMap[c] || "#555";
  }

  function buildOutfitVisual(outfit) {
     var tImg = (outfit.images && outfit.images.top) ? outfit.images.top : 'https://placehold.co/400?text=Top';
     var bImg = (outfit.images && outfit.images.bottom) ? outfit.images.bottom : 'https://placehold.co/400?text=Bottom';
     var sImg = (outfit.images && outfit.images.shoes) ? outfit.images.shoes : 'https://placehold.co/400?text=Shoes';
     var cImg = (outfit.images && outfit.images.cap) ? outfit.images.cap : null;
     
     var html = '<div style="display:flex; gap:6px; padding: 12px 12px 0 12px; background: transparent; overflow-x: auto; scrollbar-width: none;">' +
       '<div style="flex:1; min-width:85px; display:flex; flex-direction:column; background:#1c1c1c; border-radius:10px; overflow:hidden; border: 1px solid #2a2a2a;">' +
         '<img src="' + tImg + '" onerror="this.src=\'https://placehold.co/400?text=Top\'" style="width:100%; height:120px; object-fit:cover;" />' +
         '<div style="padding:8px 4px; font-size:0.7rem; text-align:center; color:#999; font-family: \'DM Sans\', sans-serif;">' + outfit.top + '</div>' +
       '</div>' +
       '<div style="flex:1; min-width:85px; display:flex; flex-direction:column; background:#1c1c1c; border-radius:10px; overflow:hidden; border: 1px solid #2a2a2a;">' +
         '<img src="' + bImg + '" onerror="this.src=\'https://placehold.co/400?text=Bottom\'" style="width:100%; height:120px; object-fit:cover;" />' +
         '<div style="padding:8px 4px; font-size:0.7rem; text-align:center; color:#999; font-family: \'DM Sans\', sans-serif;">' + outfit.bottom + '</div>' +
       '</div>' +
       '<div style="flex:1; min-width:85px; display:flex; flex-direction:column; background:#1c1c1c; border-radius:10px; overflow:hidden; border: 1px solid #2a2a2a;">' +
         '<img src="' + sImg + '" onerror="this.src=\'https://placehold.co/400?text=Shoes\'" style="width:100%; height:120px; object-fit:cover;" />' +
         '<div style="padding:8px 4px; font-size:0.7rem; text-align:center; color:#999; font-family: \'DM Sans\', sans-serif;">' + outfit.shoes + '</div>' +
       '</div>';
 
     if (outfit.cap) {
       var capImgSrc = cImg || 'https://placehold.co/400?text=Cap';
       html += '<div style="flex:1; min-width:85px; display:flex; flex-direction:column; background:#1c1c1c; border-radius:10px; overflow:hidden; border: 1px solid #2a2a2a;">' +
         '<img src="' + capImgSrc + '" onerror="this.src=\'https://placehold.co/400?text=Cap\'" style="width:100%; height:120px; object-fit:cover;" />' +
         '<div style="padding:8px 4px; font-size:0.7rem; text-align:center; color:#999; font-family: \'DM Sans\', sans-serif;">' + outfit.cap + '</div>' +
       '</div>';
     }

     html += '</div>';
     return html;
  }

  function handleBotResponse(data) {
    if (data.outfits) {
      lastContext = data.context;
      if (data.context) {
        var c = data.context;
        weatherBar.innerHTML =
          '<div class="weather-chip">&#127748; ' + c.weather + ' ' + c.temp + '</div>' +
          '<div class="weather-chip">&#128197; ' + c.season + '</div>' +
          '<div class="weather-chip">&#128336; ' + c.time + '</div>' +
          '<div class="weather-chip">&#128205; ' + c.city + '</div>';
      }

      var html = '<div class="summary-bar">' + data.summary + '</div><div class="outfits-grid">';
      html += '<div class="section-divider">New Suggestions</div>';

      // Store outfits globally so buttons can reference them by index
      if (!window._outfitStore) window._outfitStore = [];
      var storeStart = window._outfitStore.length;

      for (var i = 0; i < data.outfits.length; i++) {
        var outfit = data.outfits[i];
        var idx = storeStart + i;
        window._outfitStore[idx] = outfit;

        var titleLabel = outfit.outfitType === "best_match" ? "&#128293; Best Match" : outfit.outfitType === "alternative" ? "&#10024; Alternative" : "&#127919; Suggested Look";
        var reasonHtml = outfit.reason ? '<div class="outfit-reason">' + outfit.reason + '</div>' : '';
        var confidenceHtml = outfit.confidence ? '<div class="outfit-confidence"><span class="confidence-badge">' + outfit.confidence + '</span>' + (outfit.confidencePercent ? ' <span class="confidence-pct">' + outfit.confidencePercent + '% match</span>' : '') + '</div>' : '';

        html += '<div class="outfit-card">' +
          buildOutfitVisual(outfit) +
          '<div class="outfit-card-body" style="padding-top: 16px;">' +
            '<div class="outfit-card-title" style="margin-bottom: 12px; color: #c8a96e; letter-spacing: 0.15em;">💛 BASED ON YOUR STYLE</div>' +
            confidenceHtml +
            '<div class="outfit-row" style="margin-bottom: 8px; font-size: 0.9rem;"><span>👔</span> ' + outfit.top + '</div>' +
            '<div class="outfit-row" style="margin-bottom: 8px; font-size: 0.9rem;"><span>👖</span> ' + outfit.bottom + '</div>' +
            '<div class="outfit-row" style="margin-bottom: 8px; font-size: 0.9rem;"><span>👟</span> ' + outfit.shoes + '</div>' +
            (outfit.cap ? '<div class="outfit-row" style="margin-bottom: 12px; font-size: 0.9rem;"><span>🧢</span> ' + outfit.cap + '</div>' : '') +
            '<div class="outfit-colors">🎨 ' + outfit.colors + '</div>' +
            reasonHtml +
            '<div class="outfit-actions">' +
              '<button class="like-btn" onclick="sendFeedbackByIdx(\'liked\',' + idx + ')">&#10084; Like</button>' +
              '<button class="dislike-btn" onclick="sendFeedbackByIdx(\'disliked\',' + idx + ')">&#128078; Dislike</button>' +
              '<button class="save-btn" onclick="saveOutfitByIdx(' + idx + ')">&#128278; Save</button>' +
              '<button class="save-btn" style="background:#c8a96e; color:#000;" onclick="wearOutfitByIdx(' + idx + ')">✔️ Wear</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }

      if (data.savedOutfits && data.savedOutfits.length > 0) {
        html += '<div class="section-divider">Your Saved Outfits</div>';
        for (var j = 0; j < data.savedOutfits.length; j++) {
          var item = data.savedOutfits[j];
          html += '<div class="outfit-card saved-card"><div class="outfit-card-body">' +
            '<div class="outfit-card-title">Saved ' + (j+1) + ' <span class="saved-badge">saved</span></div>' +
            '<div class="outfit-row"><span>&#128084;</span> ' + (item.outfit && item.outfit.top ? item.outfit.top : "—") + '</div>' +
            '<div class="outfit-row"><span>&#128086;</span> ' + (item.outfit && item.outfit.bottom ? item.outfit.bottom : "—") + '</div>' +
            '<div class="outfit-row"><span>&#128095;</span> ' + (item.outfit && item.outfit.shoes ? item.outfit.shoes : "—") + '</div>' +
            '<div class="outfit-colors">&#127912; ' + (item.outfit && item.outfit.colors ? item.outfit.colors : "—") + '</div>' +
          '</div></div>';
        }
      }

      html += '</div>';
      addBotMessage(data.reply, html);



    } else {
      var html = "";
      if (data.options) {
        html += '<div class="options">';
        for (var n = 0; n < data.options.length; n++) {
          html += '<button class="opt-btn" onclick="quickSend(\'' + data.options[n] + '\')">' + data.options[n] + '</button>';
        }
        html += '</div>';
      }
      if (data.tip) html += '<div style="margin-top:8px;font-size:0.8rem;color:var(--text-muted)">' + data.tip + '</div>';
      addBotMessage(data.reply, html);
    }
  }
  // === INDEX-BASED BUTTON HANDLERS (fixes broken onclick with special chars) ===
  function sendFeedbackByIdx(reaction, idx) {
    var outfit = window._outfitStore[idx];
    if (!outfit) { addBotMessage("Could not send feedback."); return; }
    fetch("/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ outfit: outfit, reaction: reaction, occasion: lastContext && lastContext.occasion, weather: lastContext && lastContext.weatherType, season: lastContext && lastContext.season, userId: SESSION_ID })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) { addBotMessage(data.message); })
    .catch(function() { addBotMessage("Could not send feedback."); });
  }

  function saveOutfitByIdx(idx) {
    var outfit = window._outfitStore[idx];
    if (!outfit) { addBotMessage("Could not save outfit."); return; }
    fetch("/saved", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ outfit: outfit, occasion: lastContext && lastContext.occasion, season: lastContext && lastContext.season, time: lastContext && lastContext.time, userId: SESSION_ID })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) { addBotMessage(data.message); })
    .catch(function() { addBotMessage("Could not save outfit."); });
  }

  function wearOutfitByIdx(idx) {
    var outfit = window._outfitStore[idx];
    if (!outfit) return;
    fetch("/clothes")
      .then(function(res) { return res.json(); })
      .then(function(clothes) {
        var names = [outfit.top, outfit.bottom, outfit.shoes];
        if (outfit.cap) names.push(outfit.cap);
        names.forEach(function(n) {
          var item = clothes.find(function(c) { return c.name === n; });
          if (item) {
            fetch("/clothes/" + item._id + "/wear", { method: "POST" });
          }
        });
        addBotMessage("Great! I've recorded that you wore this outfit. This helps me understand your favorites! 📈");
      });
  }

  // Keep old functions as fallback
  function sendFeedback(reaction, outfitJson) {
    var outfit = JSON.parse(decodeURIComponent(outfitJson));
    fetch("/feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ outfit: outfit, reaction: reaction, occasion: lastContext && lastContext.occasion, weather: lastContext && lastContext.weatherType, season: lastContext && lastContext.season, userId: SESSION_ID })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) { addBotMessage(data.message); })
    .catch(function() { addBotMessage("Could not send feedback."); });
  }

  function saveOutfit(outfitJson) {
    var outfit = JSON.parse(decodeURIComponent(outfitJson));
    fetch("/saved", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ outfit: outfit, occasion: lastContext && lastContext.occasion, season: lastContext && lastContext.season, time: lastContext && lastContext.time, userId: SESSION_ID })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) { addBotMessage(data.message); })
    .catch(function() { addBotMessage("Could not save outfit."); });
  }

  function wearOutfit(outfitJson) {
    var outfit = JSON.parse(decodeURIComponent(outfitJson));
    fetch("/clothes")
      .then(function(res) { return res.json(); })
      .then(function(clothes) {
        var names = [outfit.top, outfit.bottom, outfit.shoes];
        if (outfit.cap) names.push(outfit.cap);
        names.forEach(function(n) {
          var item = clothes.find(function(c) { return c.name === n; });
          if (item) {
            fetch("/clothes/" + item._id + "/wear", { method: "POST" });
          }
        });
        addBotMessage("Great! I've recorded that you wore this outfit. This helps me understand your favorites! 📈");
      });
  }

  function addUserMessage(text) {
    var div = document.createElement("div");
    div.className = "msg user";
    div.innerHTML = '<div class="avatar">&#129489;</div><div class="bubble">' + text + '</div>';
    chatBox.appendChild(div);
    scrollBottom();
  }

  function addBotMessage(text, extraHtml) {
    var div = document.createElement("div");
    div.className = "msg bot";
    div.innerHTML = '<div class="avatar">&#10024;</div><div class="bubble">' + (text || "") + (extraHtml || "") + '</div>';
    chatBox.appendChild(div);
    scrollBottom();
  }

  function addTyping() {
    var id = "typing_" + Date.now();
    var div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = id;
    div.innerHTML = '<div class="avatar">&#10024;</div><div class="bubble">thinking...</div>';
    chatBox.appendChild(div);
    scrollBottom();
    return id;
  }

  function removeTyping(id) {
    var el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>
</body>
</html>
