services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: closet-api
    environment:
      PORT: 5000
      HOST: 0.0.0.0
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/digital_wardrobe}
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7
    container_name: closet-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mongodb-data:
  uploads-data:
